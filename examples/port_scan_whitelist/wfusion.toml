mode = "batch"
sinks = "../close_demo/sinks"

# 白名单：CSV 格式，header 匹配 schema 字段
[[sources]]
type = "file"
name = "seed_whitelist"
path = "data/scanner_whitelist.csv"
stream = "whitelist"
format = "csv"

# 连接事件：NDJSON 格式
[[sources]]
type = "file"
name = "seed_netflow"
path = "data/conn_events.ndjson"
stream = "netflow"
format = "ndjson"

[runtime]
executor_parallelism = 2
rule_exec_timeout = "30s"
schemas = "schemas/*.wfs"
rules   = "rules/port_scan_whitelist.wfl"

[window_defaults]
evict_interval = "30s"
max_window_bytes = "64MB"
max_total_bytes = "256MB"
evict_policy = "time_first"
watermark = "1s"
allowed_lateness = "0s"
late_policy = "drop"

[window.conn_events]
mode = "local"
max_window_bytes = "64MB"
over_cap = "30m"

[window.network_alerts]
mode = "local"
max_window_bytes = "16MB"
over_cap = "1h"

[window.scanner_whitelist]
mode = "local"
max_window_bytes = "1MB"
over_cap = "0s"

[logging]
level = "info"
format = "plain"
